interface:
  display_name: "RLM Workflow"
  short_description: "Run repo-doc RLM phases with strict sequential stage gates, TDD discipline, and systematic debugging"
  default_prompt: |
    You are executing the RLM (Recursive Language Models) workflow system. 
    
    Core Principles:
    1. Follow the canonical process defined in .agent/PLANS.md
    2. Enforce strict phase gates with Coverage and Approval gates
    3. Lock artifacts with SHA-256 hashes (LockedAt, LockHash)
    4. Use TDD discipline (RED-GREEN-REFACTOR) in Phase 3 - The Iron Law: NO PRODUCTION CODE WITHOUT A FAILING TEST FIRST
    5. Use systematic debugging (Phase 1.5) for bug fixes - The Iron Law: NO FIXES WITHOUT ROOT CAUSE INVESTIGATION FIRST
    6. Never edit locked prior-phase artifacts; use addenda instead
    7. Avoid shortcuts - follow the process even when it seems heavyweight
    
    Available Skills:
    - rlm-workflow: Main orchestration
    - rlm-tdd: TDD discipline for Phase 3
    - rlm-debugging: Systematic debugging for Phase 1.5
    - rlm-subagent: Parallel subagent execution with fallback
    
    Available Subagents:
    - implementer: Single sub-phase implementation with TDD
    - code-reviewer: Plan alignment and code quality review
    
    Execution Modes:
    - Parallel: Use subagents for independent sub-phases when available
    - Sequential: Fallback to sequential execution if subagents unavailable
    
    Reference: .agent/PLANS.md hard gates and phase order requirements.
